<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télespoir - Contact</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <main>
    <section class="contact-section">
      <div class="contact-container">

        <!-- PHOTO DU BUREAU -->
        <div class="contact-image">
          <img src="images/Mandats/25-26/Bureau/bureau.jpeg" alt="Photo du bureau Télespoir">
        </div>

        <!-- TEXTE -->
        <div class="contact-text">
          <h2>Contactez-nous</h2>

          <p>Pour toute question ou information, notre équipe est à votre disposition.</p>

          <div class="section-title">Emails</div>
          <p>
            <a href="mailto:telespoir@telecom-paris.fr">telespoir@telecom-paris.fr</a><br>
            <a href="mailto:bureau@telespoir.fr">bureau@telespoir.fr</a>
          </p>

          <div class="section-title">Réseaux sociaux</div>
          <div class="socials">
            <a href="https://www.instagram.com/telespoir/" target="_blank">
              <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.facebook.com/telespoir" target="_blank">
              <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.linkedin.com/company/telespoir/" target="_blank">
              <i class="fab fa-linkedin"></i> LinkedIn
            </a>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="js/script-header-footer.js"></script>
</body>
</html>
